---
# NW7013: azure-load-balancer-internal: "false" — explicitly internet-facing, should fire warning
apiVersion: v1
kind: Service
metadata:
  name: aks-public-lb
  namespace: production
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "false"
spec:
  type: LoadBalancer
  selector:
    app: public-api
  ports:
    - port: 443
      targetPort: 8443
---
# NW7014: AKS LB without internal annotation — should fire info
apiVersion: v1
kind: Service
metadata:
  name: aks-lb-no-annotation
  namespace: staging
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-resource-group: my-rg
spec:
  type: LoadBalancer
  selector:
    app: staging-api
  ports:
    - port: 80
      targetPort: 8080
---
# NW7015: Azure App Gateway Ingress without WAF policy — should fire warning
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agic-no-waf
  namespace: production
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
spec:
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
# Clean AKS LB: explicitly internal — should NOT fire NW7013/NW7014
apiVersion: v1
kind: Service
metadata:
  name: clean-aks-internal-lb
  namespace: production
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: internal-api
  ports:
    - port: 8080
      targetPort: 8080
---
# Clean Azure App Gateway Ingress: with WAF policy — should NOT fire NW7015
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agic-with-waf
  namespace: production
  annotations:
    kubernetes.io/ingress.class: azure/application-gateway
    appgw.ingress.kubernetes.io/waf-policy-for-path: /subscriptions/sub/resourceGroups/rg/providers/Microsoft.Network/ApplicationGatewayWebApplicationFirewallPolicies/my-waf
spec:
  rules:
    - host: secure.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
