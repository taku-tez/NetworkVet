---
# NW7001: NLB without internal annotation — internet-facing
apiVersion: v1
kind: Service
metadata:
  name: api-nlb
  namespace: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 443
      targetPort: 8443
---
# NW7002: access logs disabled — should fire error
# NW7003: no SSL cert annotation — should fire warning
# NW7004: (no ssl cert so NW7004 won't fire here — NW7004 only fires when ssl-cert IS set)
apiVersion: v1
kind: Service
metadata:
  name: public-lb-no-logs
  namespace: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "false"
spec:
  type: LoadBalancer
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 8080
---
# NW7004: SSL cert set but no TLS negotiation policy — should fire info
# NW7003 won't fire (it has ssl cert)
apiVersion: v1
kind: Service
metadata:
  name: lb-no-tls-policy
  namespace: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:123456789012:certificate/abc-123
spec:
  type: LoadBalancer
  selector:
    app: api
  ports:
    - port: 443
      targetPort: 8443
---
# NW7008: connection draining disabled — should fire info
apiVersion: v1
kind: Service
metadata:
  name: lb-no-draining
  namespace: staging
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-connection-draining-enabled: "false"
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: LoadBalancer
  selector:
    app: internal-service
  ports:
    - port: 8080
      targetPort: 8080
---
# Clean AWS LB: internal + access logs + ssl cert + tls policy — should NOT fire NW7001/7002/7003/7004
apiVersion: v1
kind: Service
metadata:
  name: clean-internal-nlb
  namespace: production
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
    service.beta.kubernetes.io/aws-load-balancer-access-log-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-ssl-cert: arn:aws:acm:us-east-1:123456789012:certificate/xyz-456
    service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
spec:
  type: LoadBalancer
  selector:
    app: internal-api
  ports:
    - port: 443
      targetPort: 8443
---
# ALB Ingress: NW7005 (no scheme), NW7006 (no security group), NW7007 (TLS but no ssl-policy)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: public-alb
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
spec:
  tls:
    - secretName: tls-secret
  rules:
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
---
# Clean ALB Ingress: internal + security group + ssl policy — should NOT fire
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clean-alb
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/security-groups: sg-0123456789abcdef0
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
spec:
  tls:
    - secretName: tls-secret
  rules:
    - host: internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
