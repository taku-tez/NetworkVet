apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: my-httproute
  namespace: app-ns
spec:
  parentRefs:
    - name: my-gateway
      namespace: gateway-ns
      sectionName: https
  rules:
    - backendRefs:
        - name: frontend-service
          port: 8080
        - name: backend-service
          namespace: backend-ns
          port: 9090
