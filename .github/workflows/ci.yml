name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  self-scan:
    name: Self-scan (networkvet on own fixtures)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci && npm run build
      - name: Scan Istio fixtures
        run: node dist/cli.js --dir tests/fixtures/istio --format sarif > istio-results.sarif || true
      - name: Scan Cilium fixtures
        run: node dist/cli.js --dir tests/fixtures/cilium --format sarif > cilium-results.sarif || true
      - name: Scan Cloud fixtures
        run: node dist/cli.js --dir tests/fixtures/cloud --format sarif > cloud-results.sarif || true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: istio-results.sarif
        continue-on-error: true
